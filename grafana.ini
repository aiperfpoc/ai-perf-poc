####################################
# DAY 4 – AI Performance POC CONFIG
####################################

[server]
protocol = http
http_port = 3000
domain = localhost
root_url = http://localhost:3001
serve_from_sub_path = false

####################################
# SECURITY
####################################

[security]
admin_user = admin
admin_password = admin
allow_embedding = true

####################################
# AUTHENTICATION
####################################

[auth]
disable_login_form = false

# Optional – Enable read-only public access (internal sharing)
[auth.anonymous]
enabled = true
org_role = Viewer

####################################
# SESSION SETTINGS
####################################

[session]
provider = file
cookie_secure = false
session_life_time = 86400

####################################
# SMTP – EMAIL ALERTS
####################################

[smtp]
enabled = true
host = smtp.gmail.com:587
user = your_email@gmail.com
password = your_app_password
from_address = your_email@gmail.com
from_name = Grafana Alerts
skip_verify = false

####################################
# ALERTING (Unified Alerting Enabled)
####################################

[unified_alerting]
enabled = true

####################################
# LOGGING
####################################

[log]
mode = console
level = info

####################################
# METRICS (OPTIONAL)
####################################

[metrics]
enabled = true