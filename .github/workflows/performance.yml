name: Performance CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install k6
        run: |
          sudo apt update
          sudo apt install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt update
          sudo apt install -y k6

      - name: Run Load Test
        run: |
          cd perf-tests
          k6 run scenarios/load.js --summary-export=results_current.json

      - name: Generate AI Summary
        run: |
          cd perf-tests/scenarios
          python3 summarize_results.py

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            performance_report.md
            performance_report.pdf